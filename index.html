
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#14141e;color:#7a8b9e;font-family:'Courier New',monospace;font-size:11px;user-select:none}
.bar{background:#0e0e18;border-bottom:1px solid #1e1e2e;padding:5px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.bar select,.bar input{background:#14141e;border:1px solid #1e2e3e;color:#7aaed0;padding:3px 5px;border-radius:3px;font-size:10px;font-family:inherit}
.bar input[type=date],.bar input[type=time]{width:auto}
.bar input[type=number]{width:54px}
.bar label{color:#3a4a5a;font-size:9px;letter-spacing:.07em}
.btn{border:1px solid #2a4a2a;color:#50c050;background:#0e1e0e;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.btn:hover{background:#182818}
.btn2{border:1px solid #2a3a4a;color:#5090c0;background:#0e1420;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.btn2:hover{background:#141e28}
.natal-bar{background:#100e1a;border-bottom:1px solid #2a1e3a;padding:4px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.natal-bar label{color:#4a3a5a;font-size:9px;letter-spacing:.07em}
.natal-bar input{background:#14141e;border:1px solid #2a1e3a;color:#b090d0;padding:3px 5px;border-radius:3px;font-size:10px;font-family:inherit}
.natal-bar input[type=date],.natal-bar input[type=time]{width:auto}
.natal-bar select{background:#14141e;border:1px solid #2a1e3a;color:#b090d0;padding:3px 5px;border-radius:3px;font-size:10px;font-family:inherit}
.natal-tag{background:#1a1028;border:1px solid #2a1e3a;border-radius:3px;padding:2px 6px;font-size:9px;color:#8060a0;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.pairs-bar{background:#0c0c16;border-bottom:1px solid #1a1a28;padding:3px 8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:26px}
.chip{display:flex;align-items:center;gap:3px;background:#14141e;border:1px solid #1e1e2e;border-radius:2px;padding:2px 5px;cursor:pointer;font-size:9px}
.chip.natal-chip{border-color:#2a1e3a;background:#120e1a}
.chip.off{opacity:.35}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rx{color:#334;font-size:9px;margin-left:1px;padding:0 1px;cursor:pointer}
.rx:hover{color:#f87171}
.canvas-wrap{position:relative}
canvas{display:block}
#tt{position:absolute;background:#080810;border:1px solid #1e2e4e;color:#90a8c0;padding:4px 8px;border-radius:3px;font-size:9px;pointer-events:none;display:none;white-space:nowrap;z-index:10;line-height:1.8}
.asp-bar{background:#0e0e18;border-top:1px solid #181828;padding:3px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.at{display:flex;align-items:center;gap:3px;cursor:pointer;padding:1px 4px;border-radius:2px;font-size:9px}
.at.off{opacity:.3}
.ald{width:8px;height:1.5px;border-radius:1px}
.bot{background:#0a0a14;border-top:1px solid #141422;padding:3px 8px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.bot label{color:#1e2e3e;font-size:9px;letter-spacing:.06em}
.bot input[type=range]{width:70px;accent-color:#2a4a6a;cursor:pointer;height:12px}
.bv{color:#3a5a7a;font-size:9px;min-width:22px}
.stat{background:#08080e;border-top:1px solid #101018;padding:2px 8px;color:#1e2e3e;font-size:8px;letter-spacing:.06em}
</style>

<!-- RANGE BAR -->
<div class="bar">
  <label>DE</label><input type="date" id="sd" value="2015-01-01">
  <label>A</label><input type="date" id="ed" value="2026-12-31">
  <label style="margin-left:4px">MODO</label>
  <select id="mode-sel" onchange="runCalc()">
    <option value="180" selected>0–180°</option>
    <option value="360">0–360°</option>
  </select>
  <button class="btn" onclick="runCalc()" style="margin-left:4px">▶ CALCULAR</button>
</div>

<!-- PAIR ADD BAR -->
<div class="bar" style="background:#0c0c14;border-bottom-color:#1a1a28">
  <label style="color:#2a5a2a">T–T</label>
  <label>P1</label><select id="np1"></select>
  <label>P2</label><select id="np2"></select>
  <button class="btn2" onclick="addPairTT()">+ TRÁNSITO–TRÁNSITO</button>
  <span style="color:#1e1e2e;margin:0 4px">|</span>
  <label style="color:#5a2a7a">T–N</label>
  <label>TRÁNSITO</label><select id="tp1"></select>
  <label>NATAL</label><select id="tp2"></select>

<!-- NATAL DATA BAR -->
<div class="natal-bar">
  <label>⬟ NATAL:</label>
  <label>FECHA</label><input type="date" id="nb-date" value="1980-06-15">
  <label>HORA</label><input type="time" id="nb-time" value="12:00">
  <label>LAT</label><input type="number" id="nb-lat" value="40.42" step="0.01" min="-90" max="90">
  <label>LON</label><input type="number" id="nb-lon" value="-3.70" step="0.01" min="-180" max="180">
  <button class="btn2" onclick="calcNatal()" style="border-color:#3a2a5a;color:#a070d0">CALCULAR NATAL</button>
  <div class="natal-tag" id="natal-tag">Sin datos natales calculados</div>
</div>

<div class="pairs-bar" id="pairs-bar"></div>
<div class="canvas-wrap" id="cwrap"><canvas id="cv"></canvas><div id="tt"></div></div>
<div class="asp-bar" id="asp-bar"></div>
<div class="bot">
  <label>ORB</label>
  <input type="range" id="orb-sl" min="1" max="12" value="7" step=".5" oninput="document.getElementById('orb-v').textContent=this.value+'°';invalidateScore();drawChart()">
  <span class="bv" id="orb-v">7°</span>
  <label>SUAVIZ</label>
  <input type="range" id="sm-sl" min="1" max="60" value="10" step="1" oninput="document.getElementById('sm-v').textContent=this.value+'d';drawChart()">
  <span class="bv" id="sm-v">10d</span>
  <span style="color:#1e3a1e;font-size:8px;margin-left:4px">POS</span><span style="color:#34d399;font-size:8px">Trígono+Sextil</span>
  <span style="color:#3a1e1e;font-size:8px;margin-left:4px">NEG</span><span style="color:#f87171;font-size:8px">Cuad+Opo</span>
  <span style="color:#3a3a1e;font-size:8px;margin-left:4px">NEU</span><span style="color:#fcd34d;font-size:8px">Conjunción</span>
</div>
<div class="stat" id="stat">LISTO · VSOP87/MEEUS · TRÁNSITOS + NATAL</div>

<script>
const J2000=2451545.0,d2r=d=>d*Math.PI/180,r2d=r=>r*180/Math.PI,n360=d=>((d%360)+360)%360;
const toJD=s=>new Date(s+'T12:00:00Z').getTime()/86400000+2440587.5;
const toJDt=(date,time)=>{const [h,m]=(time||'12:00').split(':').map(Number);return new Date(date+'T12:00:00Z').getTime()/86400000+2440587.5+(h-12)/24+m/1440;};
const fmtD=jd=>{const d=new Date((jd-2440587.5)*86400000),p=n=>String(n).padStart(2,'0');return`${p(d.getUTCDate())}/${p(d.getUTCMonth()+1)}/${d.getUTCFullYear().toString().slice(2)}`;};
const fmtY=jd=>new Date((jd-2440587.5)*86400000).getUTCFullYear();

function kepler(M,e){let E=M;for(let i=0;i<50;i++){const dE=(M-E+e*Math.sin(E))/(1-e*Math.cos(E));E+=dE;if(Math.abs(dE)<1e-10)break;}return E;}
const OE={Mercury:[252.250906,149472.6746358,0.38709927,0.20563593,1.906e-5,7.00497902,-5.94749e-3,48.33076593,-0.12534081,77.45779628,0.16047689],Venus:[181.979801,58517.815676,0.72333566,0.00677672,-4.107e-5,3.39467605,-7.889e-4,76.67984255,-0.27769418,131.60246718,2.68329e-3],Earth:[100.464457,35999.372857,1.00000261,0.01671123,-4.392e-5,0,0,0,0,102.93768193,0.32327364],Mars:[355.433275,19140.299314,1.52371034,0.09339410,7.882e-5,1.84969142,-8.131e-3,49.55953891,-0.29257343,336.04084002,0.44441088],Jupiter:[34.351519,3034.905961,5.20288700,0.04838624,-1.3253e-4,1.30439695,-1.83714e-3,100.47390909,0.20469106,14.72847983,0.21252668],Saturn:[50.077444,1222.113794,9.53667594,0.05386179,-5.0991e-4,2.48599187,1.93609e-3,113.66242448,-0.28867794,92.59887831,-0.41897216],Uranus:[314.055005,428.4669983,19.1891846,0.04725744,-4.397e-5,0.77263783,-2.42939e-3,74.01692503,0.04240589,170.95427630,0.40805281],Neptune:[304.348665,218.4862002,30.0699701,0.00859048,5.105e-5,1.77004347,3.5372e-4,131.78422574,-0.00508664,44.96476227,-0.32241464],Pluto:[238.929,145.2078,39.48168677,0.24880766,6.32e-5,17.14104260,1.1e-5,110.30347045,-1.8410e-2,224.06891629,-0.0409232]};
function helioXY(pl,T){const[L0,L1,a,e0,e1,i0,i1,O0,O1,w0,w1]=OE[pl];const e=e0+e1*T,i=d2r(i0+i1*T),Ov=d2r(n360(O0+O1*T)),wb=d2r(n360(w0+w1*T));const L=n360(L0+L1*T),M=d2r(n360(L-r2d(wb)));const E=kepler(M,e),v=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));const r=a*(1-e*Math.cos(E)),w=wb-Ov,u=v+w;return{x:r*(Math.cos(Ov)*Math.cos(u)-Math.sin(Ov)*Math.sin(u)*Math.cos(i)),y:r*(Math.sin(Ov)*Math.cos(u)+Math.cos(Ov)*Math.sin(u)*Math.cos(i))};}
function sunLon(T){const L0=n360(280.46646+36000.76983*T+3.032e-4*T*T),M=d2r(n360(357.52911+35999.05029*T-1.537e-4*T*T));const C=(1.914602-4.817e-3*T-1.4e-5*T*T)*Math.sin(M)+(0.019993-1.01e-4*T)*Math.sin(2*M)+2.89e-4*Math.sin(3*M);return n360(L0+C);}
function moonLon(T){const d=T*36525,L=n360(218.3165+13.176396*d);const M=d2r(n360(134.9634+13.064993*d)),Ms=d2r(n360(357.5291+0.985600*d)),D=d2r(n360(297.8502+12.190749*d)),F=d2r(n360(93.2721+13.229350*d));return n360(L+6.289*Math.sin(M)+1.274*Math.sin(2*D-M)+0.658*Math.sin(2*D)+0.214*Math.sin(2*M)-0.186*Math.sin(Ms)-0.114*Math.sin(2*F)+0.059*Math.sin(2*D-2*M)+0.053*Math.sin(2*D+M)+0.046*Math.sin(2*D-Ms)+0.041*Math.sin(M-Ms));}
function getLon(pl,T){if(pl==='Sun')return sunLon(T);if(pl==='Moon')return moonLon(T);const{x:xp,y:yp}=helioXY(pl,T),{x:xe,y:ye}=helioXY('Earth',T);return n360(r2d(Math.atan2(yp-ye,xp-xe)));}
function sep180(a,b){const d=Math.abs(n360(b-a));return d>180?360-d:d;}

// Zodiac sign from longitude
const SIGNS=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const signOf=lon=>{const s=Math.floor(n360(lon)/30);return SIGNS[s]+(Math.floor(n360(lon)%30))+'°';};

const PLANETS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
const SYM={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'⛢',Neptune:'♆',Pluto:'♇'};
const PCOLS2=['#fb923c','#fbbf24','#67e8f9','#818cf8','#e879f9','#34d399','#f87171','#c084fc','#60a5fa','#f472b6','#a3e635','#ff6090'];
// Natal pairs get purple-ish distinct colors
const NCOLS=['#d08af0','#a06ad0','#c060e0','#e090ff','#9050c0','#b070e0','#f0a0ff','#8040b0'];

const ASPECTS=[
  {angle:0,  name:'Cnj', sym:'☌', col:'#fcd34d',en:true, score:0,  w:1.0},
  {angle:30, name:'Semi',sym:'⚺', col:'#666666',en:false,score:0.3,w:0.4},
  {angle:45, name:'Octi',sym:'∠', col:'#888888',en:false,score:-.4,w:0.4},
  {angle:60, name:'Sex', sym:'⚹', col:'#34d399',en:true, score:1,  w:0.8},
  {angle:90, name:'Cua', sym:'□', col:'#f87171',en:true, score:-1, w:1.0},
  {angle:120,name:'Tri', sym:'△', col:'#60a5fa',en:true, score:1,  w:1.2},
  {angle:150,name:'Qui', sym:'⚻', col:'#fb923c',en:false,score:-.5,w:0.5},
  {angle:180,name:'Opo', sym:'☍', col:'#c084fc',en:true, score:-1, w:1.0},
];
let aspEn=Object.fromEntries(ASPECTS.map(a=>[a.angle,a.en]));

let pairs=[],pairData=[],colorIdx=0,nColorIdx=0;
let natalLons=null; // {Sun:lon, Moon:lon, ...}
let cachedRaw=null;
const ML=48,MR=8,MT=10,MB=18;
const SCORE_H=72,GAP=8;
let CW=0,CH=0;

function calcNatal(){
  const date=document.getElementById('nb-date').value;
  const time=document.getElementById('nb-time').value;
  const jd=toJDt(date,time);
  const T=(jd-J2000)/36525;
  natalLons={};
  PLANETS.forEach(p=>{natalLons[p]=getLon(p,T);});
  // Update tag
  const tag=document.getElementById('natal-tag');
  const parts=PLANETS.map(p=>`<span style="color:#8060a0">${SYM[p]}</span><span style="color:#5a4070">${signOf(natalLons[p])}</span>`);
  tag.innerHTML=`<span style="color:#3a2050;margin-right:4px">${date} ${time}</span>${parts.join(' ')}`;
  invalidateScore();
  if(pairData.length)drawChart();
}

function stepFor(p1){
  if(p1==='Moon')return 0.2;
  if(['Mercury','Venus'].includes(p1))return 0.4;
  if(['Sun','Mars'].includes(p1))return 0.8;
  if(['Jupiter','Saturn'].includes(p1))return 2;
  return 5;
}

function addPairTT(){
  const a=document.getElementById('np1').value,b=document.getElementById('np2').value;
  if(a===b){alert('Planetas diferentes');return;}
  if(pairs.find(p=>p.p1===a&&p.p2===b&&p.type==='tt'))return;
  const col=PCOLS2[colorIdx%PCOLS2.length];colorIdx++;
  pairs.push({p1:a,p2:b,col,id:Date.now(),vis:true,type:'tt'});
  renderChips();
}

function addPairTN(){
  if(!natalLons){alert('Primero calcula el natal (botón CALCULAR NATAL)');return;}
  const a=document.getElementById('tp1').value,b=document.getElementById('tp2').value;
  const key=`${a}-n${b}`;
  if(pairs.find(p=>p.key===key))return;
  const col=NCOLS[nColorIdx%NCOLS.length];nColorIdx++;
  pairs.push({p1:a,p2:b,col,id:Date.now(),vis:true,type:'tn',key,natalLon:natalLons[b]});
  renderChips();
}

function removePair(id){pairs=pairs.filter(p=>p.id!==id);pairData=pairData.filter(p=>p.id!==id);invalidateScore();renderChips();drawChart();}
function togglePair(id){const p=pairs.find(q=>q.id===id);if(p){p.vis=!p.vis;invalidateScore();renderChips();drawChart();}}
function invalidateScore(){cachedRaw=null;}

function renderChips(){
  const bar=document.getElementById('pairs-bar');
  bar.innerHTML='<span style="color:#1e2e3e;font-size:8px;margin-right:3px">PARES:</span>';
  pairs.forEach(p=>{
    const c=document.createElement('div');
    c.className='chip'+(p.type==='tn'?' natal-chip':'')+(p.vis?'':' off');
    const label=p.type==='tt'
      ?`${SYM[p.p1]}${p.p1}–${SYM[p.p2]}${p.p2}`
      :`${SYM[p.p1]}${p.p1}<span style="color:#4a2060">-T</span>→${SYM[p.p2]}${p.p2}<span style="color:#4a2060">-N</span>`;
    c.innerHTML=`<div class="dot" style="background:${p.col}"></div><span style="color:${p.col}">${label}</span><span class="rx" onclick="event.stopPropagation();removePair(${p.id})">✕</span>`;
    c.onclick=()=>togglePair(p.id);
    bar.appendChild(c);
  });
}

function renderAspBar(){
  const bar=document.getElementById('asp-bar');
  bar.innerHTML='<span style="color:#1e2e3e;font-size:8px;margin-right:3px">ASPECTOS:</span>';
  ASPECTS.forEach(a=>{
    const el=document.createElement('div');
    el.className='at'+(aspEn[a.angle]?'':' off');
    const sc=a.score>0?'▲':a.score<0?'▼':'●';
    const scol=a.score>0?'#34d399':a.score<0?'#f87171':'#fcd34d';
    el.innerHTML=`<div class="ald" style="background:${a.col}"></div><span style="color:${a.col}">${a.sym} ${a.angle}°</span> <span style="color:${scol};font-size:7px">${sc}</span>`;
    el.onclick=()=>{aspEn[a.angle]=!aspEn[a.angle];el.className='at'+(aspEn[a.angle]?'':' off');invalidateScore();drawChart();};
    bar.appendChild(el);
  });
}

function calcSeriesTT(p1,p2,sJD,eJD,mode){
  const step=Math.min(stepFor(p1),stepFor(p2)),pts=[];
  for(let jd=sJD;jd<=eJD;jd+=step){
    const T=(jd-J2000)/36525,l1=getLon(p1,T),l2=getLon(p2,T);
    pts.push({jd,a:mode===360?n360(l2-l1):sep180(l1,l2)});
  }
  return pts;
}

function calcSeriesTN(transitPlanet,natalLon,sJD,eJD,mode){
  // natal position is fixed; transit moves
  const step=stepFor(transitPlanet),pts=[];
  for(let jd=sJD;jd<=eJD;jd+=step){
    const T=(jd-J2000)/36525,lt=getLon(transitPlanet,T);
    pts.push({jd,a:mode===360?n360(lt-natalLon):sep180(lt,natalLon)});
  }
  return pts;
}

function calcRawScores(sJD,eJD){
  const step=Math.max(1,Math.round((eJD-sJD)/1000));
  const orb=parseFloat(document.getElementById('orb-sl').value);
  const active=pairData.filter(p=>p.vis);
  const asps=ASPECTS.filter(a=>aspEn[a.angle]);
  const scores=[];
  for(let jd=sJD;jd<=eJD;jd+=step){
    const T=(jd-J2000)/36525;
    let tot=0;
    active.forEach(pd=>{
      let l1,l2;
      if(pd.type==='tt'){l1=getLon(pd.p1,T);l2=getLon(pd.p2,T);}
      else{l1=getLon(pd.p1,T);l2=pd.natalLon;} // natal fixed
      const s=sep180(l1,l2);
      asps.forEach(a=>{
        const dev=Math.abs(s-a.angle);
        if(dev<=orb){const prox=Math.cos((dev/orb)*Math.PI/2);tot+=a.score*a.w*prox;}
      });
    });
    scores.push({jd,v:tot});
  }
  return scores;
}

function smoothArr(arr,days){
  if(!arr.length)return arr;
  const step=arr.length>1?arr[1].jd-arr[0].jd:1;
  const w=Math.max(1,Math.round(days/step));
  return arr.map((pt,i)=>{
    const lo=Math.max(0,i-w),hi=Math.min(arr.length-1,i+w);
    let sum=0,n=0;for(let k=lo;k<=hi;k++){sum+=arr[k].v;n++;}
    return{jd:pt.jd,v:sum/n};
  });
}

function placeLabels(cands){
  const placed=[];
  cands.forEach(c=>{
    let row=0,ok=false;
    while(!ok){
      ok=!placed.some(p=>p.row===row&&Math.abs(p.x-c.x)<34);
      if(!ok)row++;if(row>5)break;
    }
    placed.push({...c,row});
  });
  return placed;
}

function runCalc(){
  const sJD=toJD(document.getElementById('sd').value),eJD=toJD(document.getElementById('ed').value);
  if(eJD<=sJD){alert('Rango inválido');return;}
  if((eJD-sJD)/365.25>100){alert('Máximo 100 años');return;}
  const mode=parseInt(document.getElementById('mode-sel').value);
  document.getElementById('stat').textContent='CALCULANDO...';
  setTimeout(()=>{
    pairData=pairs.map(p=>{
      if(p.type==='tt') return{...p,pts:calcSeriesTT(p.p1,p.p2,sJD,eJD,mode)};
      else return{...p,pts:calcSeriesTN(p.p1,p.natalLon,sJD,eJD,mode)};
    });
    cachedRaw=null;
    const tnCount=pairs.filter(p=>p.type==='tn').length;
    document.getElementById('stat').textContent=`${pairs.length} PAR(ES) (${tnCount} T→N) · ${mode}° · VSOP87/MEEUS`;
    drawChart();
  },10);
}

function drawChart(){
  const cv=document.getElementById('cv');
  const wrap=document.getElementById('cwrap');
  CW=wrap.clientWidth||700;
  const mainH=Math.max(260,Math.min(460,Math.round(CW*0.44)));
  CH=mainH+GAP+SCORE_H+MB;
  cv.width=CW*devicePixelRatio;cv.height=CH*devicePixelRatio;
  cv.style.width=CW+'px';cv.style.height=CH+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);

  const W=CW,H=CH,iw=W-ML-MR,ih=mainH-MT;
  const mode=parseInt(document.getElementById('mode-sel').value);
  const maxY=mode===360?360:180;
  const sJD=toJD(document.getElementById('sd').value),eJD=toJD(document.getElementById('ed').value);
  const totalDays=eJD-sJD;
  const xj=jd=>ML+(jd-sJD)/totalDays*iw;
  const yd=d=>MT+ih-(d/maxY)*ih;
  const sTop=MT+ih+GAP,sBot=sTop+SCORE_H,sMid=(sTop+sBot)/2;

  ctx.fillStyle='#14141e';ctx.fillRect(0,0,W,H);

  // Bands
  const bands=mode===360?[[0,60],[120,180],[240,300]]:[[0,60],[120,180]];
  bands.forEach(([lo,hi])=>{ctx.fillStyle='rgba(255,255,255,0.01)';ctx.fillRect(ML,yd(hi),iw,yd(lo)-yd(hi));});

  // H grid
  const gDegs=mode===360?[0,30,60,90,120,150,180,210,240,270,300,330,360]:[0,30,60,90,120,150,180];
  gDegs.forEach(deg=>{
    const y=yd(deg);
    ctx.strokeStyle=deg%90===0?'#1e2e3e':'#161622';ctx.lineWidth=deg%90===0?.8:.4;
    ctx.beginPath();ctx.moveTo(ML,y);ctx.lineTo(W-MR,y);ctx.stroke();
    ctx.fillStyle=deg%90===0?'#3a4a5a':'#2a3040';
    ctx.font=(deg%90===0?'bold ':'')+'8px Courier New';ctx.textAlign='right';
    ctx.fillText(deg+'°',ML-3,y+3);
  });

  // V ticks
  const yrs=totalDays/365.25;
  const tickYears=yrs<=5?.25:yrs<=15?1:yrs<=40?2:yrs<=80?5:10;
  const tickDays=tickYears*365.25;
  const refJD=2451545+(Math.ceil((sJD-2451545)/tickDays))*tickDays;
  const ticks=[];
  for(let jd=refJD;jd<=eJD;jd+=tickDays)ticks.push(jd);
  ticks.forEach(jd=>{
    const x=xj(jd);
    ctx.strokeStyle='#181828';ctx.lineWidth=.4;
    ctx.beginPath();ctx.moveTo(x,MT);ctx.lineTo(x,sBot);ctx.stroke();
    const yr=fmtY(jd),mo=new Date((jd-2440587.5)*86400000).getUTCMonth()+1;
    const lbl=tickYears<1?`${String(mo).padStart(2,'0')}/${yr}`:String(yr);
    ctx.fillStyle='#2a3a50';ctx.font='8px Courier New';ctx.textAlign='center';
    ctx.fillText(lbl,x,sBot+11);
  });

  // Aspect lines
  const actAsps=mode===360?ASPECTS.filter(a=>aspEn[a.angle]):ASPECTS.filter(a=>a.angle<=180&&aspEn[a.angle]);
  actAsps.forEach(a=>{
    if(a.angle>maxY)return;
    const y=yd(a.angle);
    ctx.strokeStyle=a.col;ctx.lineWidth=.6;ctx.setLineDash([2,6]);ctx.globalAlpha=.35;
    ctx.beginPath();ctx.moveTo(ML,y);ctx.lineTo(W-MR,y);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.fillStyle=a.col;ctx.globalAlpha=.5;ctx.font='7px Courier New';ctx.textAlign='left';
    ctx.fillText(a.sym+' '+a.angle+'°',ML+2,y-2);ctx.globalAlpha=1;
  });

  // Natal planet position markers (horizontal dashed lines only for TN pairs)
  if(natalLons){
    const shownNatal=new Set(pairs.filter(p=>p.vis&&p.type==='tn').map(p=>p.p2));
    shownNatal.forEach(pl=>{
      // In 0-180 mode natal position doesn't directly map to the Y axis (Y is the transit-natal angle)
      // So we draw a small marker on Y axis at 0° with label, and a vertical marker at birth JD
    });
  }

  // Collect crossings
  const cands=[];
  pairData.filter(p=>p.vis).forEach(pd=>{
    if(!pd.pts||!pd.pts.length)return;
    const jt=mode===360?270:90;
    let prev=null;
    pd.pts.forEach((pt,i)=>{
      if(i>0&&prev&&Math.abs(pt.a-prev.a)<jt){
        actAsps.forEach(a=>{
          if(a.angle>maxY)return;
          const dp=prev.a-a.angle,dc=pt.a-a.angle;
          if(dp*dc<=0){
            const frac=Math.abs(dp)/(Math.abs(dp)+Math.abs(dc));
            const cjd=prev.jd+frac*(pt.jd-prev.jd);
            const cx=xj(cjd);
            if(cx>=ML&&cx<=W-MR&&!cands.some(c=>Math.abs(c.x-cx)<20&&c.ang===a.angle&&c.pid===pd.id))
              cands.push({x:cx,y:yd(a.angle),col:pd.col,date:fmtD(cjd),ang:a.angle,pid:pd.id,isNatal:pd.type==='tn'});
          }
        });
      }
      prev=pt;
    });
  });
  const placed=placeLabels(cands);

  // Draw curves — TT solid, TN dashed
  pairData.filter(p=>p.vis).forEach(pd=>{
    if(!pd.pts||!pd.pts.length)return;
    const jt=mode===360?270:90;
    ctx.strokeStyle=pd.col;
    ctx.lineWidth=pd.type==='tn'?1.0:1.1;
    ctx.globalAlpha=pd.type==='tn'?.75:.85;
    if(pd.type==='tn')ctx.setLineDash([4,3]);else ctx.setLineDash([]);
    ctx.beginPath();let prev=null;
    pd.pts.forEach((pt,i)=>{
      const x=xj(pt.jd),y=yd(pt.a);
      if(!prev){ctx.moveTo(x,y);}
      else if(Math.abs(pt.a-prev.a)>jt){ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);}
      else ctx.lineTo(x,y);
      prev=pt;
    });
    ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    // Right-edge label
    if(pd.pts.length){
      const last=pd.pts[pd.pts.length-1];
      const lx=xj(last.jd)+4,ly=Math.max(MT+5,Math.min(yd(last.a),MT+ih-2));
      ctx.fillStyle=pd.col;ctx.font='7px Courier New';ctx.textAlign='left';ctx.globalAlpha=.65;
      const lbl=pd.type==='tn'?`${SYM[pd.p1]}→${SYM[pd.p2]}n`:`${SYM[pd.p1]}${SYM[pd.p2]}`;
      ctx.fillText(lbl,Math.min(lx,W-MR-22),ly);
      ctx.globalAlpha=1;
    }
  });

  // Crossing markers
  placed.forEach(c=>{
    ctx.beginPath();ctx.arc(c.x,c.y,c.isNatal?2:2.5,0,Math.PI*2);
    ctx.fillStyle=c.col;ctx.globalAlpha=.85;ctx.fill();
    ctx.strokeStyle='#14141e';ctx.lineWidth=.7;ctx.stroke();ctx.globalAlpha=1;
    const ly=c.y-6-(c.row*9);
    if(ly>MT){
      ctx.fillStyle=c.col;ctx.font='7px Courier New';ctx.textAlign='center';ctx.globalAlpha=.7;
      ctx.fillText(c.date,c.x,ly);ctx.globalAlpha=1;
    }
  });

  // Main border
  ctx.strokeStyle='#1e2e3e';ctx.lineWidth=.6;ctx.setLineDash([]);
  ctx.strokeRect(ML,MT,iw,ih);

  // ---- SCORE PANEL ----
  if(!pairData.filter(p=>p.vis).length)return;
  if(!cachedRaw)cachedRaw=calcRawScores(sJD,eJD);
  const smDays=parseInt(document.getElementById('sm-sl').value);
  const scores=smoothArr(cachedRaw,smDays);
  if(!scores.length)return;
  const vals=scores.map(s=>s.v);
  const maxAbs=Math.max(0.01,...vals.map(Math.abs));
  const svY=v=>sMid-((v/maxAbs)*(SCORE_H/2-5));

  ctx.fillStyle='#0e0e18';ctx.fillRect(ML,sTop,iw,SCORE_H);
  ticks.forEach(jd=>{const x=xj(jd);ctx.strokeStyle='#161622';ctx.lineWidth=.3;ctx.beginPath();ctx.moveTo(x,sTop);ctx.lineTo(x,sBot);ctx.stroke();});
  ctx.strokeStyle='#1e2e3e';ctx.lineWidth=.6;ctx.setLineDash([3,6]);
  ctx.beginPath();ctx.moveTo(ML,sMid);ctx.lineTo(W-MR,sMid);ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle='#1e3a2a';ctx.font='7px Courier New';ctx.textAlign='right';
  ctx.fillText('+',ML-3,sTop+8);ctx.fillText('0',ML-3,sMid+3);ctx.fillText('–',ML-3,sBot-2);
  ctx.fillStyle='#162414';ctx.textAlign='right';ctx.fillText('ÍNDICE',ML-3,sTop+18);

  // fills
  ctx.beginPath();ctx.moveTo(xj(scores[0].jd),sMid);
  scores.forEach(s=>ctx.lineTo(xj(s.jd),svY(Math.max(0,s.v))));
  ctx.lineTo(xj(scores[scores.length-1].jd),sMid);ctx.closePath();
  ctx.fillStyle='rgba(52,211,153,0.18)';ctx.fill();
  ctx.beginPath();ctx.moveTo(xj(scores[0].jd),sMid);
  scores.forEach(s=>ctx.lineTo(xj(s.jd),svY(Math.min(0,s.v))));
  ctx.lineTo(xj(scores[scores.length-1].jd),sMid);ctx.closePath();
  ctx.fillStyle='rgba(248,113,113,0.18)';ctx.fill();

  // line
  ctx.lineWidth=1.2;ctx.globalAlpha=.9;
  for(let i=1;i<scores.length;i++){
    const x0=xj(scores[i-1].jd),y0=svY(scores[i-1].v),x1=xj(scores[i].jd),y1=svY(scores[i].v);
    const vm=(scores[i-1].v+scores[i].v)/2;
    ctx.strokeStyle=vm>0.08?'#34d399':vm<-0.08?'#f87171':'#fcd34d';
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='#1e2e3e';ctx.lineWidth=.5;ctx.strokeRect(ML,sTop,iw,SCORE_H);

  // Today line
  const todayJD=toJD(new Date().toISOString().slice(0,10));
  if(todayJD>=sJD&&todayJD<=eJD){
    const tx=xj(todayJD);
    ctx.strokeStyle='rgba(255,255,100,0.28)';ctx.lineWidth=.8;ctx.setLineDash([2,4]);
    ctx.beginPath();ctx.moveTo(tx,MT);ctx.lineTo(tx,sBot);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,255,100,0.35)';ctx.font='7px Courier New';ctx.textAlign='center';
    ctx.fillText('HOY',tx,MT+8);
  }

  // Legend bottom of chart: TT solid / TN dashed
  ctx.fillStyle='#2a3a4a';ctx.font='7px Courier New';ctx.textAlign='left';
  ctx.fillText('— T–T  - - T–N(natal)',ML+2,MT+ih-3);
}

// Tooltip
const cv=document.getElementById('cv'),tt=document.getElementById('tt');
cv.addEventListener('mousemove',e=>{
  if(!pairData.length){tt.style.display='none';return;}
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const sJD=toJD(document.getElementById('sd').value),eJD=toJD(document.getElementById('ed').value);
  const iw=CW-ML-MR;
  if(mx<ML||mx>CW-MR){tt.style.display='none';return;}
  const hJD=sJD+(mx-ML)/iw*(eJD-sJD);
  const d=new Date((hJD-2440587.5)*86400000),p=n=>String(n).padStart(2,'0');
  let html=`<div style="color:#304860;margin-bottom:1px">${p(d.getUTCDate())}/${p(d.getUTCMonth()+1)}/${d.getUTCFullYear()}</div>`;
  pairData.filter(p=>p.vis).forEach(pd=>{
    if(!pd.pts||!pd.pts.length)return;
    const cl=pd.pts.reduce((a,b)=>Math.abs(b.jd-hJD)<Math.abs(a.jd-hJD)?b:a);
    const tag=pd.type==='tn'?`<span style="color:#4a2060">T→N</span> `:'';
    html+=`<div>${tag}<span style="color:${pd.col}">${SYM[pd.p1]}${pd.p1}–${SYM[pd.p2]}${pd.p2}${pd.type==='tn'?'(n)':''}</span> <span style="color:#7090a8">${cl.a.toFixed(1)}°</span></div>`;
  });
  if(cachedRaw){
    const sm=parseInt(document.getElementById('sm-sl').value);
    const sc=smoothArr(cachedRaw,sm);
    if(sc.length){
      const sv=sc.reduce((a,b)=>Math.abs(b.jd-hJD)<Math.abs(a.jd-hJD)?b:a);
      const col=sv.v>0.08?'#34d399':sv.v<-0.08?'#f87171':'#fcd34d';
      html+=`<div style="border-top:1px solid #1a2030;margin-top:2px;padding-top:2px">Índice: <span style="color:${col}">${sv.v.toFixed(2)}</span></div>`;
    }
  }
  tt.innerHTML=html;tt.style.display='block';
  tt.style.left=(mx+12)+'px';tt.style.top=(my-8)+'px';
});
cv.addEventListener('mouseleave',()=>{tt.style.display='none';});

// Init selectors
[['np1','np2'],['tp1','tp2']].forEach(([id1,id2])=>{
  const s1=document.getElementById(id1),s2=document.getElementById(id2);
  PLANETS.forEach(p=>{[s1,s2].forEach(s=>{const o=document.createElement('option');o.value=p;o.textContent=SYM[p]+' '+p;s.appendChild(o);});});
});
document.getElementById('np1').value='Jupiter';
document.getElementById('np2').value='Saturn';
document.getElementById('tp1').value='Saturn';
document.getElementById('tp2').value='Mars';

renderAspBar();
// Start with some TT pairs as demo
addPairTT();
runCalc();
window.addEventListener('resize',()=>{invalidateScore();drawChart();});
</script>
